<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة اقرأ - Iqraa Platform</title>
     <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header Navigation -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <img src="img/شعار برنامج قلم (2).png" alt="icon" class="logo-icon">
                <div class="logo-text">
                    <h1>منصة اقرأ</h1>
                    <p>اقرأ بها بدأ الوحي...وبها تبنى الأجيال</p>
                </div>
            </div>

            <nav class="nav-links"id="nav-links">
                <a href="index.html" class="nav-link active">الرئيسية</a>
                <a href="categories.html" class="nav-link">الأقسام</a>
                <a href="about.html" class="nav-link">من نحن</a>
                <button id="nav-login-btn" class="btn btn-outline">تسجيل الدخول</button>
            </nav>           
                <button id="mobile-menu-btn" class="control-btn mobile-only">
                  ☰
                </button>           
        </div>
    </header>

    <!-- Main Content Sections -->
    <main class="main-content">
            <div class="hero">
                <div class="hero-vid">                
                    <video controls>
                        <source src="vid\ترحيب بالأطفال.mp4">
                    </video>                  
                </div>
                <div class="hero-text">
                    <h2>مرحباً بكم في <span class="highlight-text">منصة اقرأ</span></h2>
                    <p>المنصة التعليمية الأولى المصممة خصيصاً للأطفال. هنا نتعلم، نلعب، ونكتشف عالماً مليئاً بالمعرفة
                        والمرح!</p>
                    <div class="hero-buttons">
                        <button id="hero-start-btn" class="btn btn-primary btn-large">هيا نبدأ <i class="fa-solid fa-rocket"></i></button>
                        <button id="hero-learn-btn" class="btn btn-secondary btn-large">اعرف المزيد <i class="fa-solid fa-info-circle"></i></button>
                    </div>
                </div>
            </div>
    </main>

    <!-- Footer -->
    <footer>
            <p>&copy; 2026 منصة اقرأ. جميع الحقوق محفوظة.</p>
    </footer>

     <!-- Login Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <button id="close-modal-btn" class="close-btn play-sound-click"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header">
                <h2>تسجيل الدخول <i class="fa-solid fa-user-astronaut"></i></h2>
                <p>مرحباً بك مجدداً يا بطل!</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="name">الاسم</label>
                    <input type="text" id="name" required placeholder="أدخل اسمك">
                </div>
                <div class="form-group">
                    <label for="password">رقم المرور</label>
                    <input type="password" id="password" minlength="6" maxlength="12" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary btn-large btn-block play-sound-click">دخول</button>
            </form>
        </div>
    </div>


    <!-- Script -->
    <script src="script.js"></script>
</body>

</html>
