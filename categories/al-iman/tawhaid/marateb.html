<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراتب الدين - براعم التوحيد</title>
    <link rel="stylesheet" href="styleSection.css">

</head>
<body>

    <!-- Audio Elements -->
    <audio id="audio1" src="audio\اركان الاسلام؟.mp3"></audio>
    <audio id="audio2" src="audio\أركان الإيمان؟.mp3"></audio>
    <audio id="audio3" src="audio\ماهو الاحسان؟.mp3"></audio>

    <div class="shahada-container">
        <!-- Home Button -->
        <a href="index.html">
            <img src="img\عودة.png" alt="العودة للرئيسية" class="home-btn" title="العودة لشجرة التوحيد">
        </a>

        <!-- Title -->
        <h1 class="page-title">مراتب الدين</h1>

        <!-- Cards -->
        <div class="card-list">
            
            <!-- Card 1 -->
            <div class="card-item" onclick="playSound('audio1', this)">
                <img src="img\الإسلام.png" class="sound-btn" alt="الإسلام">
            </div>

            <!-- Card 2 -->
            <div class="card-item" onclick="playSound('audio2', this)">
                <img src="img\الإيمان.png" class="sound-btn" alt="الإيمان">
            </div>

            <!-- Card 3 -->
            <div class="card-item" onclick="playSound('audio3', this)">
                <img src="img\الإحسان.png" class="sound-btn" alt="الإحسان">
            </div>
            
        </div>
    </div>

   <script src="scriptSection.js"></script>
</body>
</html>
